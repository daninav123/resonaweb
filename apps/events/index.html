    <!-- Open Graph / Twitter ESTÁTICOS (valores de la home). Los scrapers sociales (WhatsApp,
         Facebook, LinkedIn, Twitter) NO ejecutan JS, así que necesitan estos tags en el HTML
         estático para la previsualización al compartir. SEOHead.tsx (react-helmet) los sobrescribe
         por página en navegadores/bots que renderizan JS (Googlebot).
         OJO: NO añadir aquí canonical ni meta description estáticos: react-helmet no los dedupe y
         reaparecerían los canonicals en conflicto y las descriptions múltiples (el bug que arreglamos). -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ReSona Events">
    <meta property="og:locale" content="es_ES">
    <meta property="og:url" content="https://resonaevents.com/">

    <style>
      /* Critical CSS inlined - Expandido significativamente */
      *,::before,::after{box-sizing:border-box;border-width:0;border-style:solid;border-color:#e5e7eb}

      h1{font-size:2.25rem}h2{font-size:1.875rem}h3{font-size:1.5rem}
      p{margin:0;line-height:1.625}
      img{display:block;max-width:100%;height:auto}
      button{cursor:pointer;background:transparent;border:0;padding:0;font-family:inherit}
      a{color:inherit;text-decoration:none}
      /* Tailwind utilities críticos */
      .container{width:100%;margin-left:auto;margin-right:auto;padding-left:1rem;padding-right:1rem}
      @media(min-width:640px){.container{max-width:640px}}

      .gap-4{gap:1rem}.gap-8{gap:2rem}
      .rounded{border-radius:0.25rem}.rounded-lg{border-radius:0.5rem}
      .bg-white{background-color:#fff}.bg-gray-50{background-color:#f9fafb}.bg-blue-600{background-color:#2563eb}
      .text-white{color:#fff}.text-gray-900{color:#111827}.text-gray-600{color:#4b5563}
      .shadow{box-shadow:0 1px 3px 0 rgba(0,0,0,.1)}.shadow-md{box-shadow:0 4px 6px -1px rgba(0,0,0,.1)}
      .px-4{padding-left:1rem;padding-right:1rem}.py-8{padding-top:2rem;padding-bottom:2rem}
      .mb-4{margin-bottom:1rem}.mb-8{margin-bottom:2rem}.mt-4{margin-top:1rem}
      .font-bold{font-weight:700}.font-semibold{font-weight:600}
      .text-2xl{font-size:1.5rem}.text-3xl{font-size:1.875rem}
    </style>

  <body>
    <div id="root"><div class="loading">Cargando...</div></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Google Analytics + Google Ads (Consent Mode v2) - script diferido para performance -->
    <script>
      (function() {
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') return;

        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        window.gtag = gtag;

        // Consent Mode v2: denegado por defecto (RGPD); el banner de cookies hace 'update'.
        // Releemos el consentimiento guardado para que un visitante recurrente no pierda tracking.
        var stored = null;
        try { stored = JSON.parse(localStorage.getItem('cookie_consent')); } catch (e) {}
        var analytics = stored && stored.analytics ? 'granted' : 'denied';
        var marketing = stored && stored.marketing ? 'granted' : 'denied';
        gtag('consent', 'default', {
          analytics_storage: analytics,
          ad_storage: marketing,
          ad_user_data: marketing,
          ad_personalization: marketing
        });

        gtag('js', new Date());
        gtag('config', 'G-4F522M345Z');

        // El script de gtag se carga diferido; la cola de dataLayer se procesa al cargar.
        var gaLoaded = false;
        function loadGA() {
          if (gaLoaded) return;
          gaLoaded = true;
          var script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-4F522M345Z';
          document.head.appendChild(script);
        }
        ['mousedown', 'touchstart', 'scroll', 'keydown'].forEach(function(event) {
          window.addEventListener(event, loadGA, { once: true, passive: true });
        });
        setTimeout(loadGA, 3000);
      })();
    </script>
